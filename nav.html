<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ALL-LLM Pod Navigation</title>

<style>
:root {
  --green: #0A84FF;
  --green-dim: rgba(10,132,255,.12);
  --border: #e4e4e4;
  --text: #1a1a1a;
  --muted: #6b6b6b;
  --faint: #8c8c8c;
}

body {
  margin: 0;
  font-family: Inter, sans-serif;
}

nav {
  width: 220px;
  padding: 32px 0;
  border-right: 1px solid var(--border);
  min-height: 100vh;
  background: #fff;
}

.nav-logo {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--green);
  padding: 0 24px 28px;
  border-bottom: 1px solid var(--border);
}

.nav-section-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--faint);
  padding: 18px 24px 8px;
}

.nav-item {
  display: block;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  text-decoration: none;
  padding: 7px 24px;
  border-left: 2px solid transparent;
  transition: all .15s ease;
}

.nav-item:hover {
  color: var(--text);
  background: #f9f9f9;
  border-left-color: var(--border);
}

.nav-item.active {
  color: var(--green);
  border-left-color: var(--green);
  background: var(--green-dim);
}
</style>

</head>

<body>

<nav>

  <div class="nav-logo">ALL-LLM Pod</div>

  <div class="nav-section-label">Pages</div>

  <a href="index.html"
     class="nav-item active"
     data-page="index">
    1. Overview
  </a>

  <a href="architecture.html"
     class="nav-item"
     data-page="architecture">
    2. System Architecture
  </a>

  <a href="metrics.html"
     class="nav-item"
     data-page="performance">
    3. Model Performance
  </a>

  <a href="chasing_ghosts.html"
     class="nav-item"
     data-page="chasing-ghosts">
    4. Deep Dive: Ghost Audio
  </a>

</nav>

</body>
</html>
